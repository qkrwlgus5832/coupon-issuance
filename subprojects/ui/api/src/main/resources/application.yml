spring:
  datasource:
    hikari:
      maximum-pool-size: 400
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    show-sql: true
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  data:
    redis:
      cluster:
        nodes: localhost:7001,localhost:7002,localhost:7003,localhost:7004,localhost:7005,localhost:7006

logging:
  level:
    org.hibernate.SQL: debug

server:
  tomcat:
    threads:
      max: 1200
    accept-count: 2000

management:
  endpoints:
    web:
      exposure:
        include: health, beans, httptrace, info, metrics, prometheus, env
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true